# Minimal RBAC + Deployment for the Kubernetes Lease leadership backend.
#
# The Role grants exactly the verbs the backend needs on the single Lease
# object "yacron2-leader": get (observe) and update (renew / replace / release)
# are pinned to that one Lease by resourceNames; create is a separate rule
# because RBAC does not honor resourceNames on create (the object does not yet
# exist when create is authorized). Apply with:
#
#     kubectl apply -f deployment.yaml
#
# The yacron2 config (yacron2tab.yaml in this directory) is mounted from a
# ConfigMap; create it with:
#
#     kubectl create configmap yacron2tab --from-file=yacron2tab.yaml
#
# Then watch leadership move by deleting the holder pod:
#
#     kubectl get lease yacron2-leader -o jsonpath='{.spec.holderIdentity}{"\n"}'
#     kubectl delete pod <that-pod>     # a survivor takes the lease within ~leaseDurationSeconds
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: yacron2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: yacron2-lease
rules:
  # get: observe the current holder; update: renew, take over an expired lease,
  # and release on shutdown. Both are restricted to the one Lease the backend
  # uses, so a compromised pod cannot read or hijack any other Lease in the
  # namespace. Keep resourceNames in sync with the lease name (default
  # "yacron2-leader"; set via cluster.kubernetes.leaseName if you change it).
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["yacron2-leader"]
    verbs: ["get", "update"]
  # create: first acquire. RBAC cannot scope create by resourceNames (the Lease
  # does not exist yet), so this is its own rule. It only authorizes creating a
  # Lease, not reading or modifying existing ones.
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: yacron2-lease
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: yacron2-lease
subjects:
  - kind: ServiceAccount
    name: yacron2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yacron2
spec:
  # An odd replica count is not required for a lease backend (the store is the
  # authority, not a quorum), but spreading replicas across nodes still helps
  # availability.
  replicas: 3
  selector:
    matchLabels:
      app: yacron2
  template:
    metadata:
      labels:
        app: yacron2
    spec:
      serviceAccountName: yacron2
      containers:
        - name: yacron2
          image: ghcr.io/ptweezy/yacron2:latest
          args: ["-c", "/etc/yacron2/yacron2tab.yaml"]
          # cluster.nodeName (and so the lease identity) defaults to the
          # container hostname, which Kubernetes sets to the pod name -- already
          # unique per replica. yacron2 also appends a per-process token to the
          # holderIdentity it writes (e.g. "yacron2-0#a1b2c3d4e5f6"), so even a
          # duplicate identity cannot make two pods both hold the Lease; the
          # dashboard / GET /cluster show the readable name without the suffix.
          volumeMounts:
            - name: yacron2tab
              mountPath: /etc/yacron2
              readOnly: true
      volumes:
        - name: yacron2tab
          configMap:
            name: yacron2tab
